<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirrorMirror | Admin Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root { 
            --azure-blue: #0078d4; 
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: radial-gradient(circle at center, #1e1e1e 0%, #000000 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-control {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 0.75rem;
        }

        .form-control:focus {
            background: rgba(0,0,0,0.4);
            border-color: var(--azure-blue);
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(0, 120, 212, 0.25);
        }

        .btn-azure {
            background-color: var(--azure-blue);
            border: none;
            color: white;
            padding: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .btn-azure:hover {
            background-color: #005a9e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 120, 212, 0.4);
        }

        .error-msg { 
            display: none; 
            color: #ff6b6b; 
            font-size: 0.9rem; 
            background: rgba(255, 107, 107, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .spinner-border { width: 1.2rem; height: 1.2rem; }
    </style>
</head>
<body>

<div class="login-card text-center">
    <i class="bi bi-cpu-fill text-info mb-3" style="font-size: 3.5rem; display: block;"></i>
    <h2 class="fw-bold mb-1">MirrorMirror</h2>
    <p class="text-uppercase small text-muted mb-4" style="letter-spacing: 2px;">Engine Administration</p>

    <form id="loginForm">
        <div class="mb-3 text-start">
            <label class="form-label small text-muted text-uppercase fw-bold">Email</label>
            <input type="email" id="email" class="form-control" required placeholder="admin@example.com" autocomplete="username">
        </div>
        
        <div class="mb-4 text-start">
            <label class="form-label small text-muted text-uppercase fw-bold">Password</label>
            <input type="password" id="password" class="form-control" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <div class="d-grid mb-3">
            <button type="submit" id="loginBtn" class="btn btn-azure rounded-3">
                <span id="btnText">Login</span>
                <div id="btnLoader" class="spinner-border spinner-border-sm d-none" role="status"></div>
            </button>
        </div>

        <p id="errorMsg" class="error-msg">
            <i class="bi bi-shield-lock-fill me-2"></i>Invalid username or password.
        </p>
    </form>

</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        // 1. Get Values
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const loginBtn = document.getElementById('loginBtn');

        // Show loading state
        errorMsg.style.display = 'none';
        btnText.classList.add('d-none');
        btnLoader.classList.remove('d-none');
        loginBtn.disabled = true;

        try {
            // 2. Call the NEW adjusted route
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: email,       // Changed from username to email
                    password: password 
                })
            });

            const result = await response.json();

            // 3. Handle Response
            if (response.ok) {
                // Success: Save token and account ID
                localStorage.setItem('access_token', result.access_token);
                localStorage.setItem('account_id', result.account_id);
                if (result.additional_claims) {
                    localStorage.setItem('additional_claims', result.additional_claims);
                }
                
                window.location.href = '/admin/dashboard';
            } else {
                // Use the "msg" returned by your Flask backend
                errorText.innerText = result.msg || "Invalid login attempt.";
                errorMsg.style.display = 'block';
            }
        } catch (err) {
            console.error("Connection error:", err);
            errorText.innerText = "Network error: Server is unreachable.";
            errorMsg.style.display = 'block';
        } finally {
            // Reset loading state
            btnText.classList.remove('d-none');
            btnLoader.classList.add('d-none');
            loginBtn.disabled = false;
        }
    });
</script>

</body>
</html>
