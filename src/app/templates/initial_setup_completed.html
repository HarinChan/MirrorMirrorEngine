<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirrorMirror | Setup Success</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root { --azure-blue: #0078d4; --dark-bg: #1a1a1a; }
        body { 
            background-color: #f8f9fa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar { background-color: var(--dark-bg); border-bottom: 3px solid var(--azure-blue); }
        .card { border: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-azure { background-color: var(--azure-blue); color: white; padding: 12px 24px; font-weight: 600; }
        .btn-azure:hover { background-color: #005a9e; color: white; transform: translateY(-1px); }
        
        /* Success Icon Styling */
        .success-icon {
            font-size: 4rem;
            color: #28a745;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark mb-4 shadow">
        <div class="container">
            <span class="navbar-brand d-flex align-items-center">
                <i class="bi bi-cpu-fill me-2 text-info"></i>
                <strong>MirrorMirror</strong> Engine
            </span>
        </div>
    </nav>

    <main class="container mb-auto">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5 text-center">
                <div class="card p-5">
                    <div class="card-body">
                        <div class="success-icon">
                            <i class="bi bi-check-circle-fill"></i>
                        </div>
                        
                        <h2 class="fw-bold mb-3">Initial Setup Completed</h2>
                        <p class="text-muted mb-4">
                            Your environment variables and admin accounts have been successfully initialized. You can now access the management interface.
                        </p>
                        
                        <hr class="my-4 opacity-10">
                        
                        <a href="/admin/login" class="btn btn-azure w-100 rounded-pill">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Log in to Admin Portal Here!
                        </a>
                    </div>
                </div>
                
                    <!-- <p class="mt-4 small text-muted">
                        &copy; 2026 MirrorMirror Engine &bull; Secure Configuration
                    </p> -->
            </div>
        </div>
    </main>

    <div class="mt-auto"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
