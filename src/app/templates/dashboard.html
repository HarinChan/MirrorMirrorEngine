<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirrorMirror | Admin Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        :root { --azure-blue: #0078d4; --dark-bg: #1a1a1a; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: var(--dark-bg); border-bottom: 3px solid var(--azure-blue); }
        .card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
        .btn-azure { background-color: var(--azure-blue); color: white; }
        .btn-azure:hover { background-color: #005a9e; color: white; }
        #configList { max-height: 400px; overflow-y: auto; }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
                           background: rgba(255,255,255,0.7); display: none; align-items: center; 
                           justify-content: center; border-radius: 12px; z-index: 10; }
    </style>
</head>

<body style="display: none;" id="dashboard-body">

<nav class="navbar navbar-dark mb-4 shadow">
    <div class="container">
        <span class="navbar-brand d-flex align-items-center">
            <i class="bi bi-cpu-fill me-2 text-info"></i>
            <strong>MirrorMirror</strong> Engine
        </span>
        <div class="d-flex">
            <span id="userBadge" class="navbar-text me-3 d-none d-md-inline"></span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row g-4">
        
        <div class="col-lg-5">
            <!-- Update Current Variables Card -->
            <div class="card shadow-sm mb-4 position-relative" id="updateCard">
                <div class="loading-overlay" id="formLoader">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="bi bi-gear-wide-connected me-2"></i>Configuration Settings Manager</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted small">Update Configuration Settings.</p>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Key</label>
                        <input type="text" id="configKey" class="form-control" list="keyWhitelist" placeholder="Select or type a key...">
                        <datalist id="keyWhitelist">
                            </datalist>
                        <div class="form-text text-muted" style="font-size: 0.75rem;">
                            Only keys in the whitelist can be modified.
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Value</label>
                        <div class="input-group">
                            <input type="password" id="configValue" class="form-control" placeholder="Enter sensitive value">
                            <button class="btn btn-outline-secondary" type="button" onclick="toggleVisibility()">
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="ignoreAzureToggle">
                        <label class="form-check-label small" for="ignoreAzureToggle">
                            Skip Key Vault Update
                        </label>
                        <div class="form-text text-muted" style="font-size: 0.75rem;">
                            If enabled, changes only apply to local configuration.
                        </div>
                    </div>
                    <button class="btn btn-azure w-100 py-2" onclick="updateConfig()">
                        Update Settings
                    </button>
                </div>
            </div>
            <!-- View Current Variables Card -->
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Current Variables</h5>
                    <button class="btn btn-link btn-sm text-decoration-none" onclick="fetchData()">
                        <i class="bi bi-arrow-clockwise"></i> Refresh
                    </button>
                </div>
                <div class="list-group list-group-flush" id="configList">
                    <div class="p-4 text-center text-muted">Initialising connection...</div>
                </div>
            </div>
        </div>

        <div class="col-lg-7">

            <!-- Latency Check Card -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-4"><i class="bi bi-graph-up me-2 text-azure"></i>Engine Latency (ms)</h5>
                    <canvas id="mainChart" height="150"></canvas>
                </div>
            </div>
            
            <!-- Health Check Card -->
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-heart-pulse me-2 text-danger"></i>System Health</h5>
                    <span id="overallStatus" class="badge rounded-pill">---</span>
                </div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush" id="healthList">
                        <li class="list-group-item text-center py-4 text-muted small">
                            Fetching system vitals...
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const API_BASE = '/api';
    let chartInstance = null;
    const getAuthToken = () => localStorage.getItem('access_token');

    function logout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('account_id');
        localStorage.removeItem('additional_claims');
        window.location.href = '/admin/login';
    }

    async function checkAdminAuth() {
        const token = localStorage.getItem('access_token');

        // 1. If no token at all, kick to login
        if (!token) {
            window.location.href = '/admin/login';
            return;
        }

        try {
            // 2. Call your Python admin check
            const response = await fetch('/api/auth/admin', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                // 3. Success! Reveal the dashboard
                document.getElementById('dashboard-body').style.display = 'block';
                console.log("Admin verified.");
            } else {
                // 4. Forbidden or Expired
                alert("Access Denied: You do not have admin privileges.");
                logout();
            }
        } catch (err) {
            console.error("Auth check failed:", err);
            logout();
        }
    }

    async function fetchHealth() {
        const token = localStorage.getItem('access_token');
        const healthList = document.getElementById('healthList');
        const overallStatus = document.getElementById('overallStatus');

        try {
            const response = await fetch('/api/health', { // Ensure this matches your route
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();
            const details = data.details;

            // 1. Update Overall Badge
            overallStatus.innerText = data.status.toUpperCase();
            overallStatus.className = `badge rounded-pill ${getStatusClass(data.status)}`;

            // 2. Clear and Build List
            healthList.innerHTML = '';
            
            // Loop through all keys except the 'status' key inside details
            Object.keys(details).forEach(key => {
                if (key === 'status') return; 
                if (key === 'required_checks') return;
                if (key === 'engine_latency_health') return;

                const item = details[key];
                const li = document.createElement('li');
                li.className = 'list-group-item d-flex justify-content-between align-items-center py-3';
                
                // Format name: azure_keyvault_health -> Keyvault
                const displayName = key.replace('_health', '').replace(/_/g, ' ');
                
                li.innerHTML = `
                    <div>
                        <div class="fw-bold text-capitalize">${displayName}</div>
                        <small class="text-muted">${item.message || (item.latency_ms ? item.latency_ms + 'ms' : 'Active')}</small>
                    </div>
                    <span class="badge ${getStatusClass(item.status)}">${item.status}</span>
                `;
                healthList.appendChild(li);
            });

        } catch (err) {
            console.error("Health check failed:", err);
            healthList.innerHTML = '<li class="list-group-item text-danger text-center">Failed to load health status</li>';
        }
    }

    // Helper to map status strings to Bootstrap colors
    function getStatusClass(status) {
        switch (status) {
            case 'healthy': return 'bg-success';
            case 'degraded': return 'bg-warning text-dark';
            case 'unhealthy': return 'bg-danger';
            default: return 'bg-secondary';
        }
    }

    checkAdminAuth();
    fetchHealth();

    async function updateLatencyChart() {
        const token = localStorage.getItem('access_token'); // Or wherever you store your JWT
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        try {
            const response = await fetch('/api/latency-history', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.status === 425) {
                console.warn("No history available yet.");
                return;
            }

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();

            // Map the data for Chart.js
            const labels = data.map(entry => new Date(entry.timestamp * 1000).toLocaleTimeString());
            const values = data.map(entry => entry.latency_ms);

            // Check if chart instance already exists to update it, or create new
            if (window.myLatencyChart) {
                window.myLatencyChart.data.labels = labels;
                window.myLatencyChart.data.datasets[0].data = values;
                window.myLatencyChart.update();
            } else {
                window.myLatencyChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Latency (ms)',
                            data: values,
                            borderColor: '#007fff', // Azure color
                            backgroundColor: 'rgba(0, 127, 255, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });
            }
        } catch (error) {
            console.error("Failed to fetch latency data:", error);
        }
    }

    // Initial call and refresh every 5 seconds
    updateLatencyChart();
    setInterval(updateLatencyChart, 5000);

    // 1. Toggle Visibility of the Value Input
    function toggleVisibility() {
        const input = document.getElementById('configValue');
        const icon = document.getElementById('eyeIcon');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    // 2. Fetch and Render Current Variables
    async function fetchData() {
        const listContainer = document.getElementById('configList');
        const dataList = document.getElementById('keyWhitelist');
        
        try {
            const response = await fetch('/api/config', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${getAuthToken()}` }
            });

            if (!response.ok) throw new Error('Failed to fetch config');

            const data = await response.json();
            
            // 1. Populate the Combo Box (Datalist)
            if (data.safe_set_keys_whitelist) {
                dataList.innerHTML = data.safe_set_keys_whitelist
                    .map(key => `<option value="${key}">`)
                    .join('');
            }

            // 2. Render the Current Variables List
            const vars = data.current_safe_variables;
            listContainer.innerHTML = Object.entries(vars).map(([key, value]) => `
                <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                    <div>
                        <code class="fw-bold text-azure">${key}</code>
                        <div class="small text-muted text-truncate" style="max-width: 250px;">${value}</div>
                    </div>
                    <button class="btn btn-sm btn-outline-light text-dark" onclick="fillForm('${key}', '${value}')">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                </div>
            `).join('') || '<div class="p-4 text-center text-muted">No variables found.</div>';

        } catch (error) {
            listContainer.innerHTML = `<div class="p-4 text-center text-danger">Error: ${error.message}</div>`;
        }
    }
    // 3. Update Configuration (POST)
    async function updateConfig() {
        const key = document.getElementById('configKey').value.trim();
        const value = document.getElementById('configValue').value.trim();
        const ignoreAzure = document.getElementById('ignoreAzureToggle').checked; // Capture toggle state
        const loader = document.getElementById('formLoader');

        if (!key || !value) {
            alert("Please provide both a key and a value.");
            return;
        }

        loader.style.display = 'flex';

        try {
            const response = await fetch('/api/config', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${getAuthToken()}`,
                    'Content-Type': 'application/json'
                },
                // Logic: "ignoreAzure" in Python expects True/False
                body: JSON.stringify({ 
                    key: key, 
                    value: value, 
                    ignoreAzure: ignoreAzure 
                })
            });

            const result = await response.json();

            if (response.ok) {
                alert("Configuration updated successfully!");
                // Reset fields
                document.getElementById('configValue').value = '';
                document.getElementById('ignoreAzureToggle').checked = false; 
                fetchData(); 
            } else {
                alert(`Update failed: ${result.msg}`);
            }
        } catch (error) {
            console.error("Update Error:", error);
            alert("Network error occurred while updating configuration.");
        } finally {
            loader.style.display = 'none';
        }
    }

    // Helper to fill form when clicking edit
    function fillForm(key, value) {
        document.getElementById('configKey').value = key;
        document.getElementById('configValue').value = value;
        document.getElementById('updateCard').scrollIntoView({ behavior: 'smooth' });
    }

    // Initial Load
    document.addEventListener('DOMContentLoaded', fetchData);


    // Initialize on load
    window.onload = fetchData;
</script>

</body>
</html>
